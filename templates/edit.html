<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>edit</title>
</head>
<body>
	<div align="center">
		<form action="update" method="post">
			<input type="hidden" name="id" th:value="${employee.id}" required> <br><br>
			<input type="text" name="name" th:value="${employee.name}" required> <br><br>
			<input type="text" name="job" th:value="${employee.job}" required> <br><br>
			<input type="text" name="salary" th:value="${employee.salary}" required> <br><br>
			<input type="date" name="hiredate" th:value="${#temporals.format(employee.hiredate,'yyyy-MM-dd')}" required> <br><br>
		
			<button>edit</button>
		</form>
	</div>
</body>
</html>
